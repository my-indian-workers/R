<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>वर्कर पेमेंट - All-in-One Payout</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .form-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; border-top: 5px solid #27ae60; }
        h2 { color: #27ae60; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .submit-btn { width: 100%; background-color: #27ae60; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .submit-btn:hover { background-color: #219150; }
        .submit-btn:disabled { background-color: #95a5a6; cursor: not-allowed; }
        .method-box { padding: 15px; border-radius: 8px; margin-bottom: 10px; text-align: left; border: 1px solid #eee; }
        .bg-green { background: #eafaf1; }
        .bg-gray { background: #f4f7f6; }
        label { font-weight: bold; cursor: pointer; display: block; width: 100%; }
        #canvas { display: none; }
    </style>
</head>
<body>

<div class="form-card">
    <h2>वर्कर पेमेंट (Payout)</h2>
    
    <form id="payoutForm">
        <input type="text" id="workerName" placeholder="वर्कर का नाम" required>
        
        
        
<div class="form-group">
    <label for="workInput" style="display: block; margin-bottom: 8px; font-weight: bold;">
        अपना काम चुनें (Select Your Work):
    </label>
    
    <select id="workInput" name="regWork" required 
        style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px;">
        <option value="">-- यहाँ क्लिक करके चुनें --</option>
        <option value="Plumber">प्लंबर (Plumber)</option>
        <option value="Electrician">इलेक्ट्रीशियन (Electrician)</option>
        <option value="Carpenter">बढ़ई (Carpenter)</option>
        <option value="Mason">राजमिस्त्री (Mason)</option>
        <option value="Painter">पेंटर (Painter)</option>
        <option value="Welder">वेल्डर (Welder)</option>
        <option value="AC Mechanic">एसी मैकेनिक (AC Mechanic)</option>
        <option value="Tiles Mistri">टाइल्स मिस्त्री (Tiles Mistri)</option>
        <option value="Labour">मजदूर (Labour)</option>
        <option value="Other">अन्य (Other)</option>
    </select>
</div>
        
        
        
        
        <input type="number" id="payoutAmount" placeholder="पेमेंट राशि (Amount) ₹" required>

        <hr style="margin: 20px 0; border-top: 1px dashed #ccc;">
        <p style="font-weight: bold; color: #2c3e50; text-align: left;">पेमेंट का तरीका चुनें:</p>

        <div class="method-box bg-green">
            <label><input type="radio" name="payMethod" onclick="toggleFields('upiDiv')" checked> 1. UPI ID द्वारा</label>
            <div id="upiDiv">
                <input type="text" id="workerUPI" placeholder="UPI ID (जैसे: abc@ybl)">
            </div>
        </div>

        <div class="method-box bg-gray">
            <label><input type="radio" name="payMethod" onclick="toggleFields('bankDiv')"> 2. बैंक अकाउंट द्वारा</label>
            <div id="bankDiv" style="display:none;">
                <input type="text" id="bankAcc" placeholder="अकाउंट नंबर">
                <input type="text" id="bankIFSC" placeholder="IFSC कोड">
            </div>
        </div>

        <div class="method-box bg-green">
            <label><input type="radio" name="payMethod" onclick="toggleFields('phoneDiv')"> 3. मोबाइल नंबर (Paytm/GPay/PhonePe)</label>
            <div id="phoneDiv" style="display:none;">
                <input type="tel" id="workerPhone" placeholder="10 अंकों का मोबाइल नंबर" maxlength="10">
            </div>
        </div>

        <div class="method-box bg-gray">
            <label><input type="radio" name="payMethod" onclick="toggleFields('qrDiv')"> 4. बारकोड / QR Code द्वारा</label>
            <div id="qrDiv" style="display:none;">
                <input type="file" id="qrCodeFile" accept="image/*">
                <p style="font-size: 12px; color: red;">* बारकोड की फोटो चुनें।</p>
            </div>
        </div>
        
        <button type="button" onclick="processPayment()" id="payBtn" class="submit-btn">💸 पेमेंट शुरू करें</button>
    </form>
</div>

<canvas id="canvas"></canvas>

<script>
// आपका दिया हुआ Script URL
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbznpMOw_XO-TV8zxtzezm6QBUHdkdlWhO8O0_p3QzVAJUopbw0pdv11lsWISLiTvlg/exec";

function toggleFields(divId) {
    const ids = ['upiDiv', 'bankDiv', 'phoneDiv', 'qrDiv'];
    ids.forEach(id => {
        document.getElementById(id).style.display = 'none';
    });
    document.getElementById(divId).style.display = 'block';
}

// डेटा सेव करने वाला फंक्शन

async function saveToSheet(name, amount, method, tid) {
    // डेटा को Form Data के रूप में तैयार करें
    const formData = new URLSearchParams();
    formData.append('workerName', name);
    formData.append('payoutAmount', amount);
    formData.append('method', method);
    formData.append('tid', tid);

    try {
        // no-cors के साथ Form Data भेजना सबसे सुरक्षित है
        await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors', 
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: formData.toString()
        });
        console.log("Data sent to script");
        return true; 
    } catch (e) {
        console.error("Save Error:", e);
        return false;
    }
}





async function processPayment() {
    const name = document.getElementById('workerName').value;
    const amount = document.getElementById('payoutAmount').value;
    const payBtn = document.getElementById('payBtn');
    
    if(!name || !amount) {
        alert("कृपया नाम और राशि भरें!");
        return;
    }

    // बटन लॉक करें ताकि बार-बार क्लिक न हो
    payBtn.disabled = true;
    payBtn.innerHTML = "⏳ डेटा सेव हो रहा है...";

    const tid = "TXN" + Date.now();
    let method = "";

    // 1. UPI ID
    if (document.getElementById('upiDiv').style.display !== 'none') {
        const upi = document.getElementById('workerUPI').value;
        if(!upi) { alert("UPI ID भरें!"); resetBtn(); return; }
        method = "UPI ID";
        await saveToSheet(name, amount, method, tid);
        launchUPI(upi, name, amount, tid);
    } 
    // 2. Bank Account
    else if (document.getElementById('bankDiv').style.display !== 'none') {
        const acc = document.getElementById('bankAcc').value;
        const ifsc = document.getElementById('bankIFSC').value;
        if(!acc || !ifsc) { alert("बैंक डिटेल्स भरें!"); resetBtn(); return; }
        method = "Bank Transfer";
        await saveToSheet(name, amount, method, "BANK"+Date.now());
        alert(`✅ डेटा सेव हो गया!\nनाम: ${name}\nअकाउंट: ${acc}\nIFSC: ${ifsc}`);
        resetBtn();
    }
    // 3. Mobile Number
    else if (document.getElementById('phoneDiv').style.display !== 'none') {
        const phone = document.getElementById('workerPhone').value;
        if(phone.length < 10) { alert("सही मोबाइल नंबर भरें!"); resetBtn(); return; }
        method = "Mobile Number";
        await saveToSheet(name, amount, method, tid);
        launchUPI(`${phone}@paytm`, name, amount, tid);
    }
    // 4. QR Code
    else if (document.getElementById('qrDiv').style.display !== 'none') {
        const fileInput = document.getElementById('qrCodeFile');
        if (fileInput.files.length === 0) { alert("QR कोड फोटो चुनें!"); resetBtn(); return; }

        const file = fileInput.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = async function() {
                const canvas = document.getElementById('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width; canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height);
                
                if (code) {
                    method = "QR Code";
                    await saveToSheet(name, amount, method, "QR"+Date.now());
                    window.location.href = code.data;
                    resetBtn();
                } else {
                    alert("बारकोड नहीं मिला!");
                    resetBtn();
                }
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }
}

function launchUPI(pa, pn, am, tid) {
    let finalPa = pa.trim();
    if(!finalPa.includes('@')) { finalPa += "@ybl"; }
    const url = `upi://pay?pa=${finalPa}&pn=${encodeURIComponent(pn)}&am=${am}&cu=INR&tn=Payout&tr=${tid}`;
    window.location.href = url;
    setTimeout(resetBtn, 4000);
}

function resetBtn() {
    const payBtn = document.getElementById('payBtn');
    payBtn.disabled = false;
    payBtn.innerHTML = "💸 पेमेंट शुरू करें";
}
</script>
</body>
</html>
